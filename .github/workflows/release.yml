name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 显式声明所需权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --prod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          cd dist
          zip -r ../jingzen-translate-${{ steps.version.outputs.VERSION }}.zip . -x '*.map'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jingzen-translate-${{ steps.version.outputs.VERSION }}
          path: jingzen-translate-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: jingzen-translate-${{ steps.version.outputs.VERSION }}.zip
          body: |
            ## 下载安装

            1. 下载 `jingzen-translate-${{ steps.version.outputs.VERSION }}.zip`
            2. 解压到任意目录
            3. 打开 `edge://extensions`，开启「开发人员模式」
            4. 点击「加载解压缩的扩展」，选择解压后的目录
            5. 点击工具栏图标 → 打开设置，填入 API Key

            ## 变更

            详见 [README](https://github.com/Derek-zd/JingZenTranslate#readme)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
