name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 等 tag 时触发 release
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --prod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          cd dist
          zip -r ../jingzen-translate-${{ steps.version.outputs.VERSION }}.zip . -x '*.map'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jingzen-translate-${{ steps.version.outputs.VERSION }}
          path: jingzen-translate-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: jingzen-translate-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
